<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulario em PHP</title>
</head>
<body>
   <h2>Programação Web II</h2>
   <h3>Utilizando para formatar texto da página</h3> 
   <form method="get" action="formulario.php">
    <label for="txt">Texto:</label>
    <input type="text" name="txt" id="txt" placeholder="Insira qualquer texto" size="20" maxlength="25"/>
    <br><br>

    <label for="tipo">Tipo:</label>
    <select name="tipo" id="tipo">
    <option value="Broadway">Broadway</option>
    <option value="Algerian">Algerian</option>
    <option value="Castelar">Castelar</option>
    <option value="Impact">Impact</option>
    </select>
    <br><br>

    <label for="tam">Tamanho:</label>
    <select name="tam" id="tam">
    <option value="10pt">10</option>
    <option value="20pt">20</option>
    <option value="30pt">30</option>
    <option value="40pt">40</option>
    <option value="50pt">50</option>
    </select>
    <br><br>

        <label for="cor">Cor:</label>
        <input type="color" name="color" id="color"/>
        <br><br>
        <input type="submit" value="Mudar"/>
   </form>
<!--Restante do código-->
</body>
</html>
